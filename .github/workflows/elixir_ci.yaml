name: Elixir CI

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]
  workflow_dispatch:
  schedule:
    - cron: "0 7 * * 1"

env:
  MIX_ENV: test
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-24.04
    name: Test on OTP ${{matrix.otp}} / Elixir ${{matrix.elixir}}
    strategy:
      fail-fast: false
      matrix:
        include:
          - elixir: "1.17.3"
            otp: "27.2"
          - elixir: "1.19.4"
            otp: "28.3"
    steps:

    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Elixir and Erlang
      uses: erlef/setup-beam@v1
      with:
        elixir-version: ${{ matrix.elixir }}
        otp-version: ${{ matrix.otp }}
        install-hex: true
        install-rebar: true

    - name: Restore deps and _build cache
      uses: actions/cache@v3
      with:
        path: |
          deps
          _build
        key: ${{ runner.os }}-${{ matrix.elixir }}-${{ matrix.otp }}-${{ hashFiles('**/mix.lock') }}
        restore-keys: |
          ${{ runner.os }}-${{ matrix.elixir }}-${{ matrix.otp }}-

    - name: Clean to rule out incremental build as a source of flakiness
      if: github.run_attempt != '1'
      run: |
        mix deps.clean --all
        mix clean
      shell: sh

    - name: Install dependencies
      run: mix deps.get

    - name: Compiles without warnings
      run: mix compile --warnings-as-errors

    - name: Check Formatting
      if: matrix.elixir == '1.19.4'
      run: mix format --check-formatted

    - name: Credo
      run: mix credo --strict

    # Define how to cache the `priv/plts` directory. After the first run,
    # this speeds up dialyzer runs a lot.
    - name: Cache PLTs
      id: cache-plts
      uses: actions/cache@v3
      with:
        path: priv/plts
        key: ${{ runner.os }}-${{ matrix.elixir }}-${{ matrix.otp }}-plts-v2-${{ hashFiles('**/mix.lock') }}

    - name: Dialyzer
      run: mix dialyzer

    - name: Run tests
      run: mix coveralls.github

  s3_test:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-24.04
    name: S3 MinIO tests (OTP 28 / Elixir 1.19)
    env:
      MIX_ENV: test
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Elixir and Erlang
      uses: erlef/setup-beam@v1
      with:
        elixir-version: "1.19.4"
        otp-version: "28.3"
        install-hex: true
        install-rebar: true

    - name: Restore deps and _build cache
      uses: actions/cache@v3
      with:
        path: |
          deps
          _build
        key: s3-${{ runner.os }}-1.19.4-28.3-${{ hashFiles('**/mix.lock') }}
        restore-keys: |
          s3-${{ runner.os }}-1.19.4-28.3-

    - name: Install dependencies
      run: mix deps.get

    - name: Download MinIO test binary
      run: MIX_ENV=test mix minio_server.download --arch linux-amd64 --version latest

    - name: Run S3 integration tests
      run: mix test --include s3 --exclude distributed

  distributed_durability:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-24.04
    name: Distributed durability tests (scheduled)
    env:
      MIX_ENV: test
      BEDROCK_INCLUDE_DISTRIBUTED: "1"
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Elixir and Erlang
      uses: erlef/setup-beam@v1
      with:
        elixir-version: "1.19.4"
        otp-version: "28.3"
        install-hex: true
        install-rebar: true

    - name: Restore deps and _build cache
      uses: actions/cache@v3
      with:
        path: |
          deps
          _build
        key: distributed-${{ runner.os }}-1.19.4-28.3-${{ hashFiles('**/mix.lock') }}
        restore-keys: |
          distributed-${{ runner.os }}-1.19.4-28.3-

    - name: Install dependencies
      run: mix deps.get

    - name: Download MinIO test binary
      run: MIX_ENV=test mix minio_server.download --arch linux-amd64 --version latest

    - name: Run distributed durability suite
      run: mix test --include s3 --include distributed test/bedrock/distributed/minio_durability_test.exs
